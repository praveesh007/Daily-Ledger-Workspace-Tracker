<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Ledger & Workspace</title>
  <style>
    /* Reengineered Space Gradient Variable Maps */
    :root {
      --bg-color: #050508; --card-bg: #11161d; --text-main: #c9a054; --text-muted: #e67e22; --border-color: #2c2519; --accent-green: #2ecc71; --accent-red: #e74c3c;
      --cosmic-bg: radial-gradient(circle at 50% 50%, #0d1216 0%, #06080b 40%, #020205 100%);
      --card-cosmic: linear-gradient(145deg, #090d12 0%, #11161d 60%, #171e26 100%);
    }
    [data-theme="dark"] {
      --bg-color: #020205; --card-bg: #0b0f14; --text-main: #8b949e; --text-muted: #58a6ff; --border-color: #21262d; --accent-green: #56ef83; --accent-red: #ff6b6b;
      --cosmic-bg: radial-gradient(circle at 50% 50%, #0a0f14 0%, #040609 50%, #010103 100%);
      --card-cosmic: linear-gradient(135deg, #070a0e 0%, #0f151c 100%);
    }
    [data-theme="cyberpunk"] {
      --bg-color: #00040a; --card-bg: #000f21; --text-main: #00ff66; --text-muted: #00a8ff; --border-color: #00ff66; --accent-green: #00ff66; --accent-red: #ff0055;
      --cosmic-bg: radial-gradient(circle at 50% 50%, #000b19 0%, #00040a 100%);
      --card-cosmic: linear-gradient(180deg, #001126 0%, #000814 100%);
    }
    [data-theme="sepia"] {
      --bg-color: #17120e; --card-bg: #292018; --text-main: #e6cbb7; --text-muted: #c49a78; --border-color: #4f3f32; --accent-green: #8ca38c; --accent-red: #d17777;
      --cosmic-bg: radial-gradient(circle at 50% 50%, #241a13 0%, #110c08 100%);
      --card-cosmic: linear-gradient(135deg, #211913 0%, #2f251c 100%);
    }
    [data-theme="ocean"] {
      --bg-color: #000a12; --card-bg: #002233; --text-main: #b2dfdb; --text-muted: #4db6ac; --border-color: #004d40; --accent-green: #00e5ff; --accent-red: #ff7043;
      --cosmic-bg: radial-gradient(circle at 50% 50%, #001624 0%, #000812 100%);
      --card-cosmic: linear-gradient(135deg, #001b29 0%, #002b40 100%);
    }
    [data-theme="forest"] {
      --bg-color: #030805; --card-bg: #0d1c12; --text-main: #a3e2a8; --text-muted: #73a978; --border-color: #1b3824; --accent-green: #5cd66e; --accent-red: #e58282;
      --cosmic-bg: radial-gradient(circle at 50% 50%, #08170f 0%, #020604 100%);
      --card-cosmic: linear-gradient(135deg, #09140d 0%, #122619 100%);
    }
    [data-theme="dracula"] {
      --bg-color: #0b0c10; --card-bg: #1d1f27; --text-main: #f8f8f2; --text-muted: #ff79c6; --border-color: #44475a; --accent-green: #50fa7b; --accent-red: #ff5555;
      --cosmic-bg: radial-gradient(circle at 50% 50%, #181920 0%, #090a0d 100%);
      --card-cosmic: linear-gradient(135deg, #14151a 0%, #242630 100%);
    }
    [data-theme="nord"] {
      --bg-color: #1a1c23; --card-bg: #242933; --text-main: #eceff4; --text-muted: #88c0d0; --border-color: #3b4252; --accent-green: #a3be8c; --accent-red: #bf616a;
      --cosmic-bg: radial-gradient(circle at 50% 50%, #20242c 0%, #111317 100%);
      --card-cosmic: linear-gradient(135deg, #1c2027 0%, #2b313c 100%);
    }
    [data-theme="sunset"] {
      --bg-color: #120905; --card-bg: #2b160c; --text-main: #ffb74d; --text-muted: #ff7043; --border-color: #4e2918; --accent-green: #ffd54f; --accent-red: #ff5252;
      --cosmic-bg: radial-gradient(circle at 50% 50%, #1f0f08 0%, #0a0402 100%);
      --card-cosmic: linear-gradient(135deg, #1f0f08 0%, #361c0f 100%);
    }

    /* Font Classes */
    .font-sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .font-serif { font-family: Georgia, serif; }
    .font-mono { font-family: 'Courier New', monospace; }
    .font-cursive { font-family: 'Brush Script MT', cursive, sans-serif; }
    .font-display { font-family: 'Impact', Charcoal, sans-serif; }
    .font-garamond { font-family: 'EB Garamond', Garamond, serif; }
    .font-oswald { font-family: 'Oswald', sans-serif; }
    .font-playfair { font-family: 'Playfair Display', serif; }
    .font-consolas { font-family: 'Consolas', monospace; }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;
      background: var(--body-bg-custom, var(--cosmic-bg)) !important; 
      background-size: cover; background-position: center; background-attachment: fixed;
      transition: background-color 0.3s, color 0.3s;
      color: var(--text-custom, var(--text-main));
      position: relative;
      overflow-x: hidden;
    }

    #webCanvas {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none;
    }

    .wrap {
      width: 100%; max-width: 520px; border-radius: 12px; padding: 26px;
      box-shadow: 0 30px 70px rgba(0,0,0,0.85), inset 0 0 0 1px rgba(251, 253, 255, 0.05); 
      border: 1px solid var(--border-color);
      background-size: cover; background-position: center;
      background: color-mix(in srgb, var(--card-bg-custom, var(--card-cosmic)) calc(var(--card-opacity, 1) * 100%), transparent) !important;
      color: color-mix(in srgb, var(--text-custom, var(--text-main)) calc(var(--font-opacity, 1) * 100%), transparent);
      position: relative;
      z-index: 1;
      overflow: hidden;
      backdrop-filter: blur(16px);
      transition: transform 0.2s cubic-bezier(0.1, 0.8, 0.2, 1);
    }

    #cardCanvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none;
    }

    header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; gap: 12px; position: relative; }
    .meta-area { flex-grow: 1; }
    
    .editable-field {
      border: 1px transparent dashed; padding: 4px; border-radius: 4px; outline: none; transition: all 0.2s;
    }
    .editable-field:hover, .editable-field:focus { border-color: var(--text-muted); background: rgba(255, 255, 255, 0.03); }
    #date { font-size: var(--date-size-custom, 0.9rem); font-weight: 600; text-transform: uppercase; margin-bottom: 4px; color: color-mix(in srgb, var(--text-custom, var(--text-main)) calc(var(--font-opacity, 1) * 100%), transparent); letter-spacing: 1.5px; }
    #quoteDisplay { font-size: var(--quote-size-custom, 0.85rem); font-style: italic; margin-top: 4px; display: block; color: color-mix(in srgb, var(--text-custom, var(--text-muted)) calc(var(--font-opacity, 1) * 100%), transparent); line-height: 1.4; }

    .hide-progress #sealWrapper, .hide-progress #progressBarWrapper { display: none !important; }

    .seal-container { position: relative; width: 76px; height: 76px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
    .seal-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
    .seal-bg { fill: none; stroke: var(--circle-track-custom, rgba(201, 160, 84, 0.1)); stroke-width: 3; }
    #sealFill { fill: none; stroke-width: 3; stroke-linecap: square; transition: stroke-dashoffset 0.4s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.3s; }
    .percent-label { position: absolute; font-size: 1.1rem; font-weight: 700; text-shadow: 0 0 10px rgba(0,0,0,0.8); font-family: monospace; }

    .progress-bar-container { background: rgba(255, 255, 255, 0.05); height: 4px; border-radius: 2px; overflow: hidden; margin-bottom: 16px; }
    #barFill { height: 100%; width: 0%; background: var(--text-main); transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 8px var(--text-main); }
    #statsText { font-size: 0.82rem; font-family: monospace; text-transform: uppercase; margin-bottom: 20px; color: var(--text-muted); letter-spacing: 0.5px; }

    .utility-box {
      background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 6px; padding: 12px; margin-bottom: 20px; text-align: center;
    }
    .util-display { font-size: 1.6rem; font-weight: bold; font-family: monospace; margin-bottom: 8px; letter-spacing: 1.5px; color: var(--text-main); }
    .util-row { display: flex; gap: 8px; justify-content: center; }
    .util-row button, .util-row input { padding: 6px 10px; font-size: 0.8rem; border-radius: 4px; border: 1px solid rgba(255, 255, 255, 0.08); background: rgba(0,0,0,0.5); color: var(--text-main); font-family: monospace; cursor: pointer; transition: all 0.2s; }
    .util-row button:hover { background: var(--text-main); color: #000; }
    .util-row input { width: 60px; text-align: center; }

    #list { list-style-type: none; margin-bottom: 24px; }
    .goal { display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.04); gap: 12px; position: relative; }
    .goal.done .goal-text { text-decoration: line-through; color: var(--text-muted); opacity: 0.5; }
    .goal-text { flex-grow: 1; font-size: var(--goal-size-custom, 1rem); outline: none; background: transparent; border: none; color: inherit; }
    
    .stamp { 
      width: 24px; height: 24px; border-radius: 4px; border: 1px solid rgba(255, 255, 255, 0.15); 
      background: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease-out; position: relative;
    }
    .stamp svg { width: 12px; height: 12px; opacity: 0; transition: transform 0.2s; }
    .stamp.done { background: var(--text-main); border-color: var(--text-main); box-shadow: 0 0 8px var(--text-main); }
    .stamp.done svg { opacity: 1; stroke: #000; }
    
    .del { background: none; border: none; font-size: 1.1rem; cursor: pointer; padding: 4px; line-height: 1; color: var(--text-muted); opacity: 0.4; transition: opacity 0.2s; }
    .del:hover { opacity: 1; color: var(--accent-red); }
    #empty { text-align: center; padding: 20px 0; font-style: italic; color: var(--text-muted); font-size: 0.9rem; }

    .input-row { display: flex; gap: 8px; margin-bottom: 16px; position: relative; }
    #goalInput { flex-grow: 1; padding: 12px; border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.08); font-size: 0.95rem; background: rgba(0,0,0,0.4); color: #fff; outline: none; transition: border-color 0.2s; }
    #goalInput:focus { border-color: var(--text-main); }
    button.btn { padding: 10px 18px; border-radius: 6px; border: none; font-size: 0.95rem; cursor: pointer; font-weight: 600; transition: all 0.2s; }
    #addBtn { background: var(--text-main); color: #000; text-transform: uppercase; letter-spacing: 0.5px; }
    #addBtn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 0 10px rgba(201, 160, 84, 0.4); }
    #clearBtn { width: 100%; background: transparent; border: 1px solid rgba(255, 255, 255, 0.08); font-size: 0.82rem; font-family: monospace; text-transform: uppercase; padding: 10px; margin-bottom: 24px; cursor: pointer; color: var(--text-muted); border-radius: 6px; letter-spacing: 0.5px; }
    #clearBtn:hover { background: rgba(255, 255, 255, 0.03); color: var(--text-main); }

    .config-accordion { border-top: 1px solid rgba(255, 255, 255, 0.08); padding-top: 16px; margin-top: 16px; position: relative; }
    .config-summary { font-size: 0.85rem; font-family: monospace; font-weight: bold; text-transform: uppercase; cursor: pointer; user-select: none; color: var(--text-muted); padding: 4px 0; outline: none; letter-spacing: 1px; }
    .config-panel { padding-top: 16px; }
    .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .config-field { display: flex; flex-direction: column; gap: 4px; }
    .config-field label { font-size: 0.72rem; font-family: monospace; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
    .config-field select, .config-field input { padding: 8px; border-radius: 4px; border: 1px solid rgba(255, 255, 255, 0.08); background: rgba(0,0,0,0.5); color: inherit; font-size: 0.85rem; outline: none; }
    .config-field input[type="range"] { padding: 0; cursor: pointer; }
    .config-field input[type="color"] { padding: 2px; height: 38px; cursor: pointer; width: 100%; }
    .checkbox-field { flex-direction: row; align-items: center; gap: 8px; margin-top: 6px; cursor: pointer; font-family: monospace; font-size: 0.75rem; color: var(--text-muted); }
  </style>
</head>
<body class="font-sans">

  <canvas id="webCanvas"></canvas>

  <div class="wrap" id="appWrapper">
    <canvas id="cardCanvas"></canvas>
    <header>
      <div class="meta-area">
        <div id="date" class="editable-field" contenteditable="true">Loading Date...</div>
        <div id="quoteDisplay" class="editable-field" contenteditable="true">Click here to write your custom affirmation or daily quote...</div>
      </div>
      
      <div class="seal-container" id="sealWrapper">
        <svg class="seal-svg" viewBox="0 0 76 76">
          <circle class="seal-bg" cx="38" cy="38" r="33"></circle>
          <circle id="sealFill" cx="38" cy="38" r="33"></circle>
        </svg>
        <div class="percent-label"><span id="percent">0</span>%</div>
      </div>
    </header>

    <div class="progress-bar-container" id="progressBarWrapper">
      <div id="barFill"></div>
    </div>

    <div id="statsText">0 of 0 stamped. 0% complete</div>

    <div class="utility-box" id="utilityModule" style="display: none;">
      <div class="util-display" id="utilDisplay">00:00:00</div>
      
      <div class="util-row" id="stopwatchControls" style="display: none;">
        <button id="swStartBtn">Start</button>
        <button id="swResetBtn">Reset</button>
      </div>

      <div class="util-row" id="timerControls" style="display: none;">
        <input type="number" id="timerInput" min="1" max="999" value="5" placeholder="Min">
        <button id="timerStartBtn">Set Timer</button>
        <button id="timerResetBtn">Reset</button>
      </div>
    </div>

    <ul id="list"></ul>
    <div id="empty" style="display: none;">All clear! Add a new goal below.</div>

    <div class="input-row">
      <input type="text" id="goalInput" placeholder="Add a new goal..." maxlength="100">
      <button id="addBtn" class="btn">Add</button>
    </div>

    <button id="clearBtn" class="btn">Clear Completed</button>

    <details class="config-accordion" id="configDropdown">
      <summary class="config-summary">Workspace Configuration Menu</summary>
      <div class="config-panel">
        <div class="config-grid">
          <div class="config-field">
            <label for="themeSelect">Color Theme</label>
            <select id="themeSelect">
              <option value="default">Timeline Gold (Loki)</option>
              <option value="dark">Charcoal Dark</option>
              <option value="cyberpunk">Cyberpunk Neon</option>
              <option value="sepia">Vintage Sepia</option>
              <option value="ocean">Teal Ocean</option>
              <option value="forest">Emerald Forest</option>
              <option value="dracula">Vampire Dracula</option>
              <option value="nord">Arctic Nord</option>
              <option value="sunset">Burnt Sunset</option>
            </select>
          </div>
          <div class="config-field">
            <label for="textColorPicker">Font Color</label>
            <input type="color" id="textColorPicker" value="#c9a054">
          </div>
          <div class="config-field">
            <label for="cardBgColorPicker">Block/Card Background Color</label>
            <input type="color" id="cardBgColorPicker" value="#11161d">
          </div>
          <div class="config-field">
            <label for="pageBgColorPicker">Web Page Custom BG Color</label>
            <input type="color" id="pageBgColorPicker" value="#050508">
          </div>

          <div class="config-field">
            <label for="circleTrackColorPicker">Percentage Ring Track Color</label>
            <input type="color" id="circleTrackColorPicker" value="#2c2519">
          </div>
          <div class="config-field">
            <label for="circleFillColorPicker">Percentage Ring Progress Color</label>
            <input type="color" id="circleFillColorPicker" value="#c9a054">
          </div>

          <div class="config-field">
            <label for="fontSelect">Typography</label>
            <select id="fontSelect">
              <option value="font-sans">System Sans</option>
              <option value="font-serif">Classic Serif</option>
              <option value="font-mono">Console Space</option>
              <option value="font-cursive">Script Signature</option>
              <option value="font-display">Impact Bold</option>
              <option value="font-garamond">Garamond Book</option>
              <option value="font-oswald">Oswald Lean</option>
              <option value="font-playfair">Playfair Display</option>
              <option value="font-consolas">Tech Consolas</option>
            </select>
          </div>
          <div class="config-field">
            <label for="utilitySelect">Auxiliary Widget</label>
            <select id="utilitySelect">
              <option value="none">Hidden</option>
              <option value="clock">Live Clock</option>
              <option value="stopwatch">Stopwatch</option>
              <option value="timer">Countdown Timer</option>
            </select>
          </div>
          <div class="config-field">
            <label for="bgImageLocal">Card Background Local File</label>
            <div class="file-input-wrapper">
              <input type="file" id="bgImageLocal" accept="image/*" style="width: 100%;">
              <button class="clear-file-btn" id="clearFileBtn" title="Clear Image">X</button>
            </div>
          </div>
          <div class="config-field">
            <label for="pageBgImageLocal">Web Page Background File</label>
            <div class="file-input-wrapper">
              <input type="file" id="pageBgImageLocal" accept="image/*" style="width: 100%;">
              <button class="clear-file-btn" id="clearPageFileBtn" title="Clear Page Image">X</button>
            </div>
          </div>
          <div class="config-field">
            <label for="cardOpacityRange">Card Background Alpha Opacity</label>
            <input type="range" id="cardOpacityRange" min="0.1" max="1.0" step="0.05" value="1.0">
          </div>
          <div class="config-field">
            <label for="fontOpacityRange">Internal Type Alpha Opacity</label>
            <input type="range" id="fontOpacityRange" min="0.1" max="1.0" step="0.05" value="1.0">
          </div>
          
          <div class="config-field">
            <label for="dateSizeRange">Date Font Size</label>
            <input type="range" id="dateSizeRange" min="0.6" max="2.0" step="0.05" value="0.9">
          </div>
          <div class="config-field">
            <label for="quoteSizeRange">Quote Font Size</label>
            <input type="range" id="quoteSizeRange" min="0.6" max="2.0" step="0.05" value="0.85">
          </div>
          <div class="config-field">
            <label for="goalSizeRange">Goals Font Size</label>
            <input type="range" id="goalSizeRange" min="0.7" max="2.5" step="0.05" value="1.0">
          </div>
        </div>
        <div class="config-field checkbox-field">
          <input type="checkbox" id="progressToggle" checked>
          <label for="progressToggle">Show Progress Visualizer Rings & Bars</label>
        </div>
      </div>
    </details>
  </div>

  <script>
    const STORAGE_KEY = 'daily-ledger-goals-v1';
    const CONFIG_KEY = 'daily-ledger-config-v1';
    
    const defaultGoals = [
      { id: 1, text: 'Prune temporal variants', done: true },
      { id: 2, text: 'Monitor timeline fluctuations', done: false },
      { id: 3, text: 'Locate the Citadel at the End of Time', done: false }
    ];

    function loadGoals(){
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return { goals: defaultGoals, nextId: 4 };
        const parsed = JSON.parse(raw);
        if(!Array.isArray(parsed.goals)) return { goals: defaultGoals, nextId: 4 };
        return parsed;
      } catch(e) { return { goals: defaultGoals, nextId: 4 }; }
    }

    function saveGoals(){
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ goals, nextId })); } catch(e) {}
    }

    let config = {
      theme: 'default',
      font: 'font-sans',
      utility: 'none',
      textColor: '',
      cardBgColor: '',
      pageBgImage: '',
      pageBgColor: '',
      bgImage: '',
      circleTrackColor: '',
      circleFillColor: '',
      cardOpacity: '1.0',
      fontOpacity: '1.0',
      dateFontSize: '0.9',
      quoteFontSize: '0.85',
      goalFontSize: '1.0',
      showProgress: true,
      isPanelOpen: false,
      customQuote: 'For all time. Always.',
      customDate: new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })
    };

    function loadConfig(){
      try {
        const raw = localStorage.getItem(CONFIG_KEY);
        if(raw) {
          const parsed = JSON.parse(raw);
          config = { ...config, ...parsed };
        }
      } catch(e) {}
    }

    function saveConfig(){
      try { localStorage.setItem(CONFIG_KEY, JSON.stringify(config)); } catch(e) {}
    }

    let { goals, nextId } = loadGoals();
    loadConfig();

    const list = document.getElementById('list');
    const empty = document.getElementById('empty');
    const input = document.getElementById('goalInput');
    const addBtn = document.getElementById('addBtn');
    const clearBtn = document.getElementById('clearBtn');
    const sealFill = document.getElementById('sealFill');
    const percentText = document.getElementById('percent');
    const barFill = document.getElementById('barFill');
    const statsText = document.getElementById('statsText');
    const dateEl = document.getElementById('date');
    const quoteEl = document.getElementById('quoteDisplay');
    const appWrapper = document.getElementById('appWrapper');

    const themeSelect = document.getElementById('themeSelect');
    const textColorPicker = document.getElementById('textColorPicker');
    const cardBgColorPicker = document.getElementById('cardBgColorPicker');
    const fontSelect = document.getElementById('fontSelect');
    const utilitySelect = document.getElementById('utilitySelect');
    const bgImageLocal = document.getElementById('bgImageLocal');
    const clearFileBtn = document.getElementById('clearFileBtn');
    const pageBgImageLocal = document.getElementById('pageBgImageLocal');
    const clearPageFileBtn = document.getElementById('clearPageFileBtn');
    const pageBgColorPicker = document.getElementById('pageBgColorPicker');
    const circleTrackColorPicker = document.getElementById('circleTrackColorPicker');
    const circleFillColorPicker = document.getElementById('circleFillColorPicker');
    const cardOpacityRange = document.getElementById('cardOpacityRange');
    const fontOpacityRange = document.getElementById('fontOpacityRange');
    const dateSizeRange = document.getElementById('dateSizeRange');
    const quoteSizeRange = document.getElementById('quoteSizeRange');
    const goalSizeRange = document.getElementById('goalSizeRange');
    const progressToggle = document.getElementById('progressToggle');
    const configDropdown = document.getElementById('configDropdown');

    const utilityBox = document.getElementById('utilityModule');
    const utilDisplay = document.getElementById('utilDisplay');
    const stopwatchControls = document.getElementById('stopwatchControls');
    const timerControls = document.getElementById('timerControls');

    const CIRC = 2 * Math.PI * 33;
    sealFill.style.strokeDasharray = CIRC;

    function applyConfigurationUI() {
      document.documentElement.setAttribute('data-theme', config.theme);
      document.body.className = config.font || 'font-sans';
      
      appWrapper.style.backgroundImage = config.bgImage ? `url('${config.bgImage}')` : 'none';
      
      if(config.cardBgColor) {
        appWrapper.style.setProperty('--card-bg-custom', config.cardBgColor);
        cardBgColorPicker.value = config.cardBgColor;
      } else {
        appWrapper.style.removeProperty('--card-bg-custom');
        cardBgColorPicker.value = '#11161d';
      }

      document.body.style.backgroundImage = config.pageBgImage ? `url('${config.pageBgImage}')` : 'none';
      if(config.pageBgColor) {
        document.body.style.setProperty('--body-bg-custom', config.pageBgColor);
        pageBgColorPicker.value = config.pageBgColor;
      } else {
        document.body.style.removeProperty('--body-bg-custom');
        pageBgColorPicker.value = '#050508';
      }
      
      if(config.textColor) {
        appWrapper.style.setProperty('--text-custom', config.textColor);
        textColorPicker.value = config.textColor;
      } else {
        appWrapper.style.removeProperty('--text-custom');
        textColorPicker.value = '#c9a054';
      }

      if(config.circleTrackColor) {
        appWrapper.style.setProperty('--circle-track-custom', config.circleTrackColor);
        circleTrackColorPicker.value = config.circleTrackColor;
      } else {
        appWrapper.style.removeProperty('--circle-track-custom');
      }

      if(config.circleFillColor) {
        circleFillColorPicker.value = config.circleFillColor;
      } else {
        circleFillColorPicker.value = '#c9a054';
      }

      appWrapper.style.setProperty('--date-size-custom', config.dateFontSize + 'rem');
      appWrapper.style.setProperty('--quote-size-custom', config.quoteFontSize + 'rem');
      appWrapper.style.setProperty('--goal-size-custom', config.goalFontSize + 'rem');

      appWrapper.style.setProperty('--card-opacity', config.cardOpacity);
      appWrapper.style.setProperty('--font-opacity', config.fontOpacity);

      if(config.showProgress) {
        appWrapper.classList.remove('hide-progress');
      } else {
        appWrapper.classList.add('hide-progress');
      }

      dateEl.textContent = config.customDate;
      quoteEl.textContent = config.customQuote;

      themeSelect.value = config.theme;
      fontSelect.value = config.font || 'font-sans';
      utilitySelect.value = config.utility || 'none';
      cardOpacityRange.value = config.cardOpacity;
      fontOpacityRange.value = config.fontOpacity;
      dateSizeRange.value = config.dateFontSize;
      quoteSizeRange.value = config.quoteFontSize;
      goalSizeRange.value = config.goalFontSize;
      progressToggle.checked = config.showProgress;
      
      if(config.isPanelOpen) {
        configDropdown.setAttribute('open', '');
      } else {
        configDropdown.removeAttribute('open');
      }

      renderUtilityModule();
    }

    let utilInterval = null;

    function renderUtilityModule() {
      if(utilInterval) clearInterval(utilInterval);
      utilityBox.style.display = 'none';
      stopwatchControls.style.display = 'none';
      timerControls.style.display = 'none';

      if (!config.utility || config.utility === 'none') return;
      utilityBox.style.display = 'block';

      if (config.utility === 'clock') {
        const updateClock = () => {
          const d = new Date();
          utilDisplay.textContent = d.toTimeString().split(' ')[0];
        };
        updateClock();
        utilInterval = setInterval(updateClock, 1000);
      } 
      else if (config.utility === 'stopwatch') {
        stopwatchControls.style.display = 'flex';
        const updateStopwatch = () => {
          const running = localStorage.getItem('sw_running') === 'true';
          const startTS = parseInt(localStorage.getItem('sw_start_ts') || '0', 10);
          const elapsedBase = parseInt(localStorage.getItem('sw_elapsed_base') || '0', 10);
          
          let totalMs = elapsedBase;
          if (running && startTS > 0) {
            totalMs += Date.now() - startTS;
          }
          
          const hrs = Math.floor(totalMs / 3600000).toString().padStart(2, '0');
          const mins = Math.floor((totalMs % 3600000) / 60000).toString().padStart(2, '0');
          const secs = Math.floor((totalMs % 60000) / 1000).toString().padStart(2, '0');
          utilDisplay.textContent = `${hrs}:${mins}:${secs}`;
          document.getElementById('swStartBtn').textContent = running ? 'Pause' : 'Start';
        };
        updateStopwatch();
        utilInterval = setInterval(updateStopwatch, 250);
      } 
      else if (config.utility === 'timer') {
        timerControls.style.display = 'flex';
        const updateTimer = () => {
          const running = localStorage.getItem('tm_running') === 'true';
          const endTS = parseInt(localStorage.getItem('tm_end_ts') || '0', 10);
          
          let remaining = 0;
          if (running) {
            remaining = Math.max(0, endTS - Date.now());
            if (remaining === 0) {
              localStorage.setItem('tm_running', 'false');
              alert('Timeline paradox stabilized! Timer complete.');
            }
          } else {
            remaining = parseInt(localStorage.getItem('tm_remain_base') || '0', 10);
          }

          const hrs = Math.floor(remaining / 3600000).toString().padStart(2, '0');
          const mins = Math.floor((remaining % 3600000) / 60000).toString().padStart(2, '0');
          const secs = Math.floor((remaining % 60000) / 1000).toString().padStart(2, '0');
          utilDisplay.textContent = `${hrs}:${mins}:${secs}`;
        };
        updateTimer();
        utilInterval = setInterval(updateTimer, 250);
      }
    }

    document.getElementById('swStartBtn').onclick = () => {
      const running = localStorage.getItem('sw_running') === 'true';
      if (!running) {
        localStorage.setItem('sw_running', 'true');
        localStorage.setItem('sw_start_ts', Date.now().toString());
      } else {
        const startTS = parseInt(localStorage.getItem('sw_start_ts') || '0', 10);
        const currentElapsed = parseInt(localStorage.getItem('sw_elapsed_base') || '0', 10);
        const delta = Date.now() - startTS;
        localStorage.setItem('sw_running', 'false');
        localStorage.setItem('sw_elapsed_base', (currentElapsed + delta).toString());
      }
      renderUtilityModule();
    };

    document.getElementById('swResetBtn').onclick = () => {
      localStorage.setItem('sw_running', 'false');
      localStorage.setItem('sw_start_ts', '0');
      localStorage.setItem('sw_elapsed_base', '0');
      renderUtilityModule();
    };

    document.getElementById('timerStartBtn').onclick = () => {
      const mins = parseInt(document.getElementById('timerInput').value, 10) || 5;
      const msDuration = mins * 60 * 1000;
      localStorage.setItem('tm_running', 'true');
      localStorage.setItem('tm_end_ts', (Date.now() + msDuration).toString());
      renderUtilityModule();
    };

    document.getElementById('timerResetBtn').onclick = () => {
      localStorage.setItem('tm_running', 'false');
      localStorage.setItem('tm_end_ts', '0');
      localStorage.setItem('tm_remain_base', '0');
      renderUtilityModule();
    };

    function render(){
      list.innerHTML = "";
      if(goals.length === 0){
        empty.style.display = 'block';
      } else {
        empty.style.display = 'none';
        goals.forEach(g => {
          const li = document.createElement('li');
          li.className = 'goal' + (g.done ? ' done' : '');

          const stamp = document.createElement('button');
          stamp.className = 'stamp' + (g.done ? ' done' : '');
          stamp.setAttribute('aria-label', g.done ? 'Mark branch variant active' : 'Prune variant branch');
          stamp.innerHTML = '<svg viewBox="0 0 12 12" fill="none"><path d="M2 6.2L4.8 9L10 3" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
          stamp.onclick = () => toggle(g.id);

          stamp.addEventListener('mousemove', (e) => {
            const bounds = stamp.getBoundingClientRect();
            const x = e.clientX - bounds.left - bounds.width / 2;
            const y = e.clientY - bounds.top - bounds.height / 2;
            stamp.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
          });
          stamp.addEventListener('mouseleave', () => {
            stamp.style.transform = '';
          });

          const text = document.createElement('span');
          text.className = 'goal-text';
          text.textContent = g.text;

          const del = document.createElement('button');
          del.className = 'del';
          del.setAttribute('aria-label', 'Delete branch coordinate');
          del.textContent = 'x';
          del.onclick = () => remove(g.id);

          li.appendChild(stamp);
          li.appendChild(text);
          li.appendChild(del);
          list.appendChild(li);
        });
      }

      const total = goals.length;
      const done = goals.filter(g => g.done).length;
      const pct = total ? Math.round((done / total) * 100) : 0;
      percentText.textContent = pct;
      barFill.style.width = pct + '%';
      sealFill.style.strokeDashoffset = CIRC * (1 - pct / 100);
      
      if(config.circleFillColor) {
        sealFill.style.stroke = config.circleFillColor;
      } else {
        sealFill.style.stroke = 'var(--text-main)';
      }

      statsText.textContent = total === 0
        ? 'Timeline normalized. No assignments.'
        : done + ' of ' + total + ' branches pruned. ' + pct + '% stabilized';
    }

    function toggle(id){
      goals = goals.map(g => g.id === id ? { ...g, done: !g.done } : g);
      saveGoals();
      render();
    }

    function remove(id){
      goals = goals.filter(g => g.id !== id);
      saveGoals();
      render();
    }

    function addGoal(){
      const val = input.value.trim();
      if(!val) return;
      goals.push({ id: nextId++, text: val, done: false });
      input.value = '';
      saveGoals();
      render();
      input.focus();
    }

    addBtn.onclick = addGoal;
    input.addEventListener('keydown', e => { if(e.key === 'Enter') addGoal(); });
    clearBtn.onclick = () => {
      goals = goals.filter(g => !g.done);
      saveGoals();
      render();
    };

    themeSelect.onchange = (e) => { 
      config.theme = e.target.value; 
      config.textColor = ''; 
      config.pageBgColor = '';
      config.cardBgColor = '';
      config.circleTrackColor = '';
      config.circleFillColor = '';
      saveConfig(); 
      applyConfigurationUI(); 
      render();
    };
    
    textColorPicker.oninput = (e) => {
      config.textColor = e.target.value;
      saveConfig();
      appWrapper.style.setProperty('--text-custom', config.textColor);
    };

    cardBgColorPicker.oninput = (e) => {
      config.cardBgColor = e.target.value;
      saveConfig();
      appWrapper.style.setProperty('--card-bg-custom', config.cardBgColor);
    };

    pageBgColorPicker.oninput = (e) => {
      config.pageBgColor = e.target.value;
      saveConfig();
      document.body.style.setProperty('--body-bg-custom', config.pageBgColor);
    };

    circleTrackColorPicker.oninput = (e) => {
      config.circleTrackColor = e.target.value;
      saveConfig();
      appWrapper.style.setProperty('--circle-track-custom', config.circleTrackColor);
    };

    circleFillColorPicker.oninput = (e) => {
      config.circleFillColor = e.target.value;
      saveConfig();
      render();
    };

    fontSelect.onchange = (e) => { config.font = e.target.value; saveConfig(); applyConfigurationUI(); };
    utilitySelect.onchange = (e) => { config.utility = e.target.value; saveConfig(); applyConfigurationUI(); };
    
    dateSizeRange.oninput = (e) => {
      config.dateFontSize = e.target.value;
      saveConfig();
      appWrapper.style.setProperty('--date-size-custom', config.dateFontSize + 'rem');
    };

    quoteSizeRange.oninput = (e) => {
      config.quoteFontSize = e.target.value;
      saveConfig();
      appWrapper.style.setProperty('--quote-size-custom', config.quoteFontSize + 'rem');
    };

    goalSizeRange.oninput = (e) => {
      config.goalFontSize = e.target.value;
      saveConfig();
      appWrapper.style.setProperty('--goal-size-custom', config.goalFontSize + 'rem');
    };

    bgImageLocal.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(event) {
        config.bgImage = event.target.result;
        saveConfig();
        applyConfigurationUI();
      };
      reader.readAsDataURL(file);
    };

    clearFileBtn.onclick = () => {
      bgImageLocal.value = '';
      config.bgImage = '';
      saveConfig();
      applyConfigurationUI();
    };

    pageBgImageLocal.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        config.pageBgImage = event.target.result;
        saveConfig();
        applyConfigurationUI();
      };
      reader.readAsDataURL(file);
    };

    clearPageFileBtn.onclick = () => {
      pageBgImageLocal.value = '';
      config.pageBgImage = '';
      saveConfig();
      applyConfigurationUI();
    };

    cardOpacityRange.oninput = (e) => {
      config.cardOpacity = e.target.value;
      saveConfig();
      appWrapper.style.setProperty('--card-opacity', config.cardOpacity);
    };

    fontOpacityRange.oninput = (e) => {
      config.fontOpacity = e.target.value;
      saveConfig();
      appWrapper.style.setProperty('--font-opacity', config.fontOpacity);
    };

    progressToggle.onchange = (e) => { config.showProgress = e.target.checked; saveConfig(); applyConfigurationUI(); };
    
    configDropdown.addEventListener('toggle', () => {
      config.isPanelOpen = configDropdown.open;
      saveConfig();
    });

    dateEl.onblur = () => { config.customDate = dateEl.textContent; saveConfig(); };
    quoteEl.onblur = () => { config.customQuote = quoteEl.textContent; saveConfig(); };

    // ===================================================
    // GLOBAL BACKGROUND LAYER: THE SACRED TIMELINE INTERACTION
    // ===================================================
    const canvas = document.getElementById('webCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const maxParticles = 60; 
    const connectionDist = 140;
    const mouse = { x: null, y: null, radius: 200 };

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
        this.radius = Math.random() * 1.5 + 1;
      }
      update() {
        this.x += this.vx; this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

        if (mouse.x !== null && mouse.y !== null) {
          const dx = this.x - mouse.x;
          const dy = this.y - mouse.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < mouse.radius) {
            const force = (mouse.radius - dist) / mouse.radius;
            this.x += (dx / dist) * force * 1.2;
            this.y += (dy / dist) * force * 1.2;
          }
        }
      }
      draw() {
        const themeColor = getComputedStyle(appWrapper).getPropertyValue('--text-muted').trim() || '#e67e22';
        ctx.fillStyle = themeColor;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < maxParticles; i++) particles.push(new Particle());
    }
    initParticles();

    // ===================================================
    // CARD BOUNDARY LAYER: TEMPORAL CHRONO-DUST DECAY
    // ===================================================
    const cardCanvas = document.getElementById('cardCanvas');
    const cctx = cardCanvas.getContext('2d');
    let cardParticles = [];
    const cardMouse = { x: null, y: null };

    function resizeCardCanvas() {
      cardCanvas.width = appWrapper.clientWidth;
      cardCanvas.height = appWrapper.clientHeight;
    }
    
    const resizeObserver = new ResizeObserver(() => resizeCardCanvas());
    resizeObserver.observe(appWrapper);

    appWrapper.addEventListener('mousemove', (e) => {
      const rect = appWrapper.getBoundingClientRect();
      cardMouse.x = e.clientX - rect.left;
      cardMouse.y = e.clientY - rect.top;

      const tiltX = (cardMouse.y - rect.height / 2) / 40;
      const tiltY = -(cardMouse.x - rect.width / 2) / 40;
      appWrapper.style.transform = `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;

      if (Math.random() < 0.5) {
        cardParticles.push({
          x: cardMouse.x,
          y: cardMouse.y,
          vx: (Math.random() - 0.5) * 1.2,
          vy: (Math.random() - 0.5) * -1.5, 
          alpha: 1,
          size: Math.random() * 1.8 + 0.8
        });
      }
    });

    appWrapper.addEventListener('mouseleave', () => {
      cardMouse.x = null; cardMouse.y = null;
      appWrapper.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
    });

    function updateCardParticles() {
      for (let i = cardParticles.length - 1; i >= 0; i--) {
        let p = cardParticles[i];
        p.x += p.vx; p.y += p.vy; p.alpha -= 0.025;
        if (p.alpha <= 0) {
          cardParticles.splice(i, 1);
        }
      }
    }

    function drawCardParticles() {
      const themeColor = getComputedStyle(appWrapper).getPropertyValue('--text-main').trim() || '#c9a054';
      cctx.clearRect(0, 0, cardCanvas.width, cardCanvas.height);
      cardParticles.forEach(p => {
        cctx.save();
        cctx.globalAlpha = p.alpha;
        cctx.fillStyle = themeColor;
        cctx.beginPath();
        cctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        cctx.fill();
        cctx.restore();
      });
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const themeMuted = getComputedStyle(appWrapper).getPropertyValue('--text-muted').trim() || '#e67e22';
      const themeMain = getComputedStyle(appWrapper).getPropertyValue('--text-main').trim() || '#c9a054';
      
      particles.forEach(p => { p.update(); p.draw(); });

      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < connectionDist) {
            const alpha = (1 - dist / connectionDist) * 0.18;
            ctx.strokeStyle = `color-mix(in srgb, ${themeMuted} ${alpha * 100}%, transparent)`;
            ctx.lineWidth = 0.6; ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
        if (mouse.x !== null && mouse.y !== null) {
          const dx = particles[i].x - mouse.x;
          const dy = particles[i].y - mouse.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < mouse.radius) {
            const alpha = (1 - dist / mouse.radius) * 0.3;
            ctx.strokeStyle = `color-mix(in srgb, ${themeMain} ${alpha * 100}%, transparent)`;
            ctx.lineWidth = 0.9; ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(mouse.x, mouse.y);
            ctx.stroke();
          }
        }
      }

      updateCardParticles();
      drawCardParticles();

      requestAnimationFrame(animate);
    }
    
    animate();
    applyConfigurationUI();
    render();
  </script>
</body>
</html>
